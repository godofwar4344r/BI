services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bi
      POSTGRES_PASSWORD: bi
      POSTGRES_DB: bi
    ports:
      - "5432:5432"
    volumes:
      - bi-postgres:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.11.5
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - bi-qdrant:/qdrant/storage

volumes:
  bi-postgres:
  bi-qdrant:
